# Public-facing reverse proxy for EVE-NG with Duo MFA gate.
# nginx terminates TLS on 443 and proxies to EVE-NG's Apache on 127.0.0.1:80.
# Apache MUST be reconfigured to listen only on 127.0.0.1 (apply script does this)
# so nobody can bypass the gate by hitting the box directly.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- 80: ACME challenge + redirect to 443 -------------------------------
server {
    listen 80;
    server_name lab.radiobelcher.com;

    # Let's Encrypt HTTP-01 challenge (served before the redirect)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443 main site ------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name lab.radiobelcher.com;

    ssl_certificate     /etc/ssl/eve/fullchain.pem;
    ssl_certificate_key /etc/ssl/eve/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 4G;   # EVE image uploads

    # --- The Duo gateway itself (NOT behind the auth gate) ---
    location /gw/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth subrequest endpoint ---
    location = /gw/auth {
        internal;
        proxy_pass http://127.0.0.1:5000/gw/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # --- Everything else: EVE-NG, gated by Duo ---
    location / {
        auth_request /gw/auth;
        error_page 401 = @login;

        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;     # HTML5 consoles (websockets)
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # keep long-lived console sockets open
    }

    location @login {
        return 302 /gw/login?rd=$request_uri;
    }
}
