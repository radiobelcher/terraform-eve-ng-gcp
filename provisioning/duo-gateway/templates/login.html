<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lab.radiobelcher.com · secure login</title>
  <style>
    :root {
      --bg:#0a0a0a; --bg2:#141414; --panel:#1b1b1b; --line:#2a2a2a;
      --orange:#ff7a00; --orange-hi:#ff9233; --orange-lo:#cc6200;
      --text:#ececec; --muted:#8d8d8d; --danger:#ff5252;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text); display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(255,122,0,.10), transparent 60%),
        repeating-linear-gradient(45deg, var(--bg) 0 22px, var(--bg2) 22px 44px);
    }
    .card {
      width:360px; background:var(--panel); border:1px solid var(--line);
      border-top:3px solid var(--orange); border-radius:10px; padding:34px 30px 28px;
      box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,122,0,.05);
    }
    .brand { text-align:center; margin-bottom:22px; }
    .brand .mark {
      display:inline-flex; align-items:center; justify-content:center;
      width:54px; height:54px; border-radius:12px; margin-bottom:12px;
      background:linear-gradient(145deg,var(--orange),var(--orange-lo));
      box-shadow:0 6px 18px rgba(255,122,0,.35); font-weight:800; font-size:26px; color:#0a0a0a;
    }
    .brand h1 { font-size:17px; margin:0; letter-spacing:.3px; }
    .brand .sub { color:var(--muted); font-size:12px; margin-top:4px; }
    label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.6px; }
    input {
      width:100%; padding:11px 12px; background:#0e0e0e; color:var(--text);
      border:1px solid var(--line); border-radius:6px; font-size:14px; outline:none; transition:border-color .15s,box-shadow .15s;
    }
    input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,122,0,.18); }
    button {
      width:100%; margin-top:22px; padding:12px; border:0; border-radius:6px; cursor:pointer;
      font-size:14px; font-weight:700; letter-spacing:.4px; color:#0a0a0a;
      background:linear-gradient(145deg,var(--orange-hi),var(--orange));
      transition:filter .15s, transform .05s;
    }
    button:hover { filter:brightness(1.08); }
    button:active { transform:translateY(1px); }
    .error {
      margin-top:18px; background:rgba(255,82,82,.10); border:1px solid rgba(255,82,82,.4);
      color:var(--danger); padding:9px 11px; border-radius:6px; font-size:13px; text-align:center;
    }
    .duo { margin-top:20px; text-align:center; color:var(--muted); font-size:11px; letter-spacing:.4px; }
    .duo b { color:var(--orange); }
    .foot { margin-top:18px; text-align:center; color:#5a5a5a; font-size:11px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/gw/login?rd={{ rd|urlencode }}">
    <div class="brand">
      <div class="mark">λ</div>
      <h1>RADIOBELCHER LAB</h1>
      <div class="sub">EVE-NG · authorized access only</div>
    </div>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" autofocus required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit">Continue to Duo &rarr;</button>

    <div class="duo">protected by <b>Duo</b> two-factor authentication</div>
    <div class="foot">All access is logged and monitored.</div>
  </form>
</body>
</html>
